<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>prism</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* 背景光晕 */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: conic-gradient(
        from 0deg,
        rgba(255, 80, 120, 0.15),
        rgba(120, 80, 255, 0.15),
        rgba(80, 200, 255, 0.15),
        rgba(80, 255, 160, 0.15),
        rgba(255, 220, 80, 0.15),
        rgba(255, 80, 120, 0.15)
      );
      border-radius: 50%;
      filter: blur(80px);
      animation: rotateBg 12s linear infinite;
    }

    @keyframes rotateBg {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* 棱镜三角形 */
    .prism-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    .prism-svg {
      width: 160px;
      height: 160px;
      filter: drop-shadow(0 0 24px rgba(180, 120, 255, 0.6));
      animation: floatPrism 4s ease-in-out infinite;
    }

    @keyframes floatPrism {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(-14px) rotate(3deg); }
    }

    /* 光线扩散 */
    .ray {
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: drawRay 1.6s ease forwards;
    }
    .ray:nth-child(1) { animation-delay: 0.3s; }
    .ray:nth-child(2) { animation-delay: 0.5s; }
    .ray:nth-child(3) { animation-delay: 0.7s; }
    .ray:nth-child(4) { animation-delay: 0.9s; }
    .ray:nth-child(5) { animation-delay: 1.1s; }

    @keyframes drawRay {
      to { stroke-dashoffset: 0; }
    }

    /* 文字区域 */
    .title-wrap {
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      background: linear-gradient(
        135deg,
        #ff6ec7 0%,
        #a78bfa 30%,
        #60c8ff 60%,
        #34eca8 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite alternate;
      background-size: 200% 200%;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .subtitle {
      margin-top: 12px;
      font-size: 0.95rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
    }

    /* 底部链接占位 */
    .links {
      display: flex;
      gap: 24px;
      margin-top: 8px;
    }

    .link-btn {
      padding: 10px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .link-btn:hover {
      border-color: rgba(167, 139, 250, 0.6);
      color: #a78bfa;
      background: rgba(167, 139, 250, 0.08);
      box-shadow: 0 0 16px rgba(167, 139, 250, 0.2);
    }

    /* 粒子 */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: particleFly linear infinite;
    }

    @keyframes particleFly {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 背景粒子 -->
  <div class="particles" id="particles"></div>

  <!-- 背景光晕 -->
  <div class="bg-glow"></div>

  <!-- 主内容 -->
  <main class="prism-wrap">

    <!-- 棱镜 SVG -->
    <svg class="prism-svg" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="prismFace1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#60c8ff" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="prismFace2" x1="1" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.5"/>
        </linearGradient>
        <linearGradient id="rayGrad1" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#ff6ec7"/>
          <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="rayGrad2" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#f97316"/>
          <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="rayGrad3" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#facc15"/>
          <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="rayGrad4" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#34eca8"/>
          <stop offset="100%" stop-color="#34eca8" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="rayGrad5" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#60c8ff"/>
          <stop offset="100%" stop-color="#60c8ff" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- 入射光 -->
      <line x1="10" y1="72" x2="52" y2="80" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"
            stroke-dasharray="60" stroke-dashoffset="60"
            style="animation: drawRay 1s ease 0.1s forwards;"/>

      <!-- 棱镜主体 -->
      <polygon points="80,18 138,118 22,118"
               fill="url(#prismFace1)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <!-- 棱镜内部折射线 -->
      <line x1="52" y1="80" x2="100" y2="118" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

      <!-- 折射光线 -->
      <line class="ray" x1="100" y1="110" x2="148" y2="88"  stroke="url(#rayGrad1)" stroke-width="2"/>
      <line class="ray" x1="100" y1="112" x2="148" y2="100" stroke="url(#rayGrad2)" stroke-width="2"/>
      <line class="ray" x1="100" y1="114" x2="148" y2="112" stroke="url(#rayGrad3)" stroke-width="2"/>
      <line class="ray" x1="100" y1="116" x2="148" y2="124" stroke="url(#rayGrad4)" stroke-width="2"/>
      <line class="ray" x1="100" y1="118" x2="148" y2="136" stroke="url(#rayGrad5)" stroke-width="2"/>
    </svg>

    <!-- 文字 -->
    <div class="title-wrap">
      <h1>prism</h1>
      <p class="subtitle">coming soon</p>
    </div>

    <!-- 链接占位 -->
    <div class="links">
      <a class="link-btn" href="#">GitHub</a>
      <a class="link-btn" href="#">Projects</a>
    </div>

  </main>

  <script>
    // 生成随机粒子
    const container = document.getElementById('particles');
    const colors = ['#ff6ec7','#a78bfa','#60c8ff','#34eca8','#facc15','#f97316'];
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 1;
      const color = colors[Math.floor(Math.random() * colors.length)];
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        background: ${color};
        box-shadow: 0 0 ${size * 2}px ${color};
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 10}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
